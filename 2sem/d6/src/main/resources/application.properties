server.port=8080

# ---- Database (edit for your local demo DB) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/demo
spring.datasource.username=postgres
spring.datasource.password=postgres

# Important: demo DB uses schema "bookings"
spring.sql.init.mode=never

spring.jackson.serialization.write-dates-as-timestamps=false

# Flyway (optional, can be disabled if you don't want to apply indexes automatically)
spring.flyway.enabled=true
spring.flyway.schemas=bookings
spring.flyway.default-schema=bookings

